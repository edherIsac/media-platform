services:
  minio:
    image: minio/minio:latest
    container_name: mfp-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://media-console.jinkoni.com.mx/}
      MINIO_SERVER_URL: ${MINIO_API_URL:-https://media-s3.jinkoni.com.mx}
    volumes:
      - minio_data:/data
    networks:
      - npm_default
      - media_internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3

  imgproxy:
    image: darthsim/imgproxy:latest
    container_name: mfp-imgproxy
    restart: unless-stopped
    depends_on:
      minio:
        condition: service_healthy
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      IMGPROXY_S3_BUCKET: ${S3_BUCKET}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      IMGPROXY_KEY: ${IMGPROXY_KEY}
      IMGPROXY_SALT: ${IMGPROXY_SALT}
      IMGPROXY_ALLOW_INSECURE: ${IMGPROXY_ALLOW_INSECURE:-false}
      IMGPROXY_TTL: ${IMGPROXY_TTL:-31536000}
      IMGPROXY_CACHE_HEADER_PASSTHROUGH: "false"
    networks:
      - npm_default
      - media_internal
    healthcheck:
      test: ["CMD", "imgproxy", "health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  minio_data:

networks:
  npm_default:
    external: true
  media_internal:
    internal: true
